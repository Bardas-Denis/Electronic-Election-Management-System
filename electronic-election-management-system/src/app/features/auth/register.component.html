<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </span>
      <span class="brand-name">{{ 'nav.brand' | translate }}</span>
    </div>

    <div class="card-header">
      <h1>{{ 'auth.register.heading' | translate }}</h1>
      <p class="subtitle">{{ 'auth.register.subtitle' | translate }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-auth-email-field
        [control]="form.controls.email"
        inputId="reg-email"
        labelKey="auth.register.emailLabel"
        placeholderKey="auth.register.emailPlaceholder"
        requiredErrorKey="auth.register.emailRequired"
        invalidErrorKey="auth.register.emailInvalid"
      ></app-auth-email-field>

      <app-auth-password-field
        [control]="form.controls.password"
        inputId="reg-password"
        labelKey="auth.register.passwordLabel"
        placeholderKey="auth.register.passwordPlaceholder"
        requiredErrorKey="auth.register.passwordRequired"
        minLengthErrorKey="auth.register.passwordMinLength"
        showPasswordKey="auth.register.showPassword"
        hidePasswordKey="auth.register.hidePassword"
        autocomplete="new-password"
      ></app-auth-password-field>

      <app-auth-password-field
        [control]="form.controls.confirmPassword"
        inputId="reg-confirm"
        labelKey="auth.register.confirmLabel"
        placeholderKey="auth.register.confirmPlaceholder"
        requiredErrorKey="auth.register.confirmRequired"
        showPasswordKey="auth.register.showPassword"
        hidePasswordKey="auth.register.hidePassword"
        autocomplete="new-password"
        [mismatch]="form.hasError('passwordsMismatch')"
        mismatchErrorKey="auth.register.passwordsMismatch"
      ></app-auth-password-field>

      @if (errorMessageKey()) {
        <div class="server-error" role="alert">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          {{ errorMessageKey() | translate }}
        </div>
      }

      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
          {{ 'auth.register.submitting' | translate }}
        } @else {
          {{ 'auth.register.submit' | translate }}
        }
      </button>
    </form>

    <p class="switch-link">
      {{ 'auth.register.hasAccount' | translate }}
      <a routerLink="/login">{{ 'auth.register.login' | translate }}</a>
    </p>
  </div>
</div>
