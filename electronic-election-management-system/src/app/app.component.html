<nav class="navbar">
  <a routerLink="/elections" class="brand">Election System</a>

  @if (authService.isLoggedIn()) {
    <div class="nav-right">
      @if (authService.isAdmin()) {
        <a routerLink="/admin/users">Utilizatori</a>
      }
      <span>{{ authService.currentUser()?.email }}</span>
      <button (click)="logout()">Delogare</button>
    </div>
  } @else {
    <div class="nav-right">
      <a routerLink="/login">Login</a>
      <a routerLink="/register">Cont nou</a>
    </div>
  }
</nav>

<router-outlet></router-outlet>
